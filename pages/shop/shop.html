<body>
    <div class="top-bar">
        <div class="container">
            <div class="top-bar-content">
                <span><i class="fas fa-truck"></i> Miá»…n phĂ­ váº­n chuyá»ƒn cho Ä‘Æ¡n tá»« 900.000 ₫</span>
            </div>
        </div>
    </div>

    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">
                    <img src="https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=50&h=50&fit=crop" alt="Logo" class="logo-img">
                    <span class="logo-text">Pet Marketplace</span>
                </a>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="TĂ¬m thá»©c Äƒn, bĂ¡nh thÆ°á»Ÿng, Ä‘á»“ chÆ¡i vĂ  nhiá»u hÆ¡n...">
                    <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i></button>
                </div>
                <div class="header-actions">
                    <a href="/pages/shop/cart.html" class="header-action cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-count">0</span>
                        <span>Giá» hĂ ng</span>

        </div>

    <div class="shop-container">
        <div class="container">
            <div class="shop-header">
                <h1>Cá»­a hĂ ng</h1>
                <div class="shop-controls">
                    <select id="sortSelect" style="padding: 10px 15px; border: 1px solid #ddd; border-radius: 8px;">
                        <option value="createdAt-desc">Má»›i nháº¥t</option>
                        <option value="price-asc">GiĂ¡: tháº¥p Ä‘áº¿n cao</option>
                        <option value="price-desc">GiĂ¡: cao Ä‘áº¿n tháº¥p</option>
                        <option value="soldCount-desc">BĂ¡n cháº¡y</option>
                        <option value="rating-desc">ÄĂ¡nh giĂ¡ cao</option>
                        <option value="originalPrice-desc">Giáº£m nhiá»u nháº¥t</option>
                    </select>
                </div>
            </div>

            <div class="shop-content">
                <aside class="shop-sidebar">
                    <div class="filter-section">
                        <h3>Danh má»¥c</h3>
                        <div id="categoryFilters">
                            <label><input type="radio" name="category" value="" checked> Táº¥t cáº£ danh má»¥c</label>
                        </div>
                    </div>

                    <div class="filter-section">
                        <h3>Khoáº£ng giĂ¡</h3>
                        <div class="price-range">
                            <input type="number" id="minPrice" placeholder="Tá»«">
                            <span>-</span>
                            <input type="number" id="maxPrice" placeholder="Äáº¿n">
                            <button class="btn btn-secondary btn-small" onclick="applyFilters()">Lá»c</button>
                        </div>
                    </div>

                    <div class="filter-section">
                        <h3>Loáº¡i thĂº cÆ°ng</h3>
                        <div id="petTypeFilters">
                            <label><input type="radio" name="petType" value="" checked> Táº¥t cáº£ thĂº cÆ°ng</label>
                            <label><input type="radio" name="petType" value="dog"> ChĂ³</label>
                            <label><input type="radio" name="petType" value="cat"> MĂ¨o</label>
                            <label><input type="radio" name="petType" value="bird"> Chim</label>
                            <label><input type="radio" name="petType" value="fish"> CĂ¡</label>
                            <label><input type="radio" name="petType" value="small-pet"> ThĂº nhá»</label>
                        </div>
                    </div>

                    <div class="filter-section">
                        <h3>ThÆ°Æ¡ng hiá»‡u</h3>
                        <select id="brandFilter" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                            <option value="">Táº¥t cáº£ thÆ°Æ¡ng hiá»‡u</option>
                        </select>
                    </div>

                    <div class="filter-section">
                        <h3>TĂ¬nh tráº¡ng</h3>
                        <label><input type="checkbox" id="inStockFilter"> Chá»‰ hiá»ƒn thá»‹ cĂ²n hĂ ng</label>
                        <label><input type="checkbox" id="onSaleFilter"> Äang giáº£m giĂ¡</label>
                    </div>

                    <div class="filter-section">
                        <h3>ÄĂ¡nh giĂ¡</h3>
                        <select id="ratingFilter" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                            <option value="">Táº¥t cáº£ má»©c Ä‘Ă¡nh giĂ¡</option>
                            <option value="5">5 sao</option>
                            <option value="4">Tá»« 4 sao trá»Ÿ lĂªn</option>
                            <option value="3">Tá»« 3 sao trá»Ÿ lĂªn</option>
                            <option value="2">Tá»« 2 sao trá»Ÿ lĂªn</option>
                        </select>
                    </div>
                </aside>

                <main>
                    <div class="products-grid" id="productsGrid">
                        <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i></div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="../../js/config.js"></script>
    <script src="../../js/api/client.js"></script>
    <script src="../../js/utils.js?v=20260418-vnd-1"></script>
    <script src="../../js/components/auth.js?v=20260418-vntext-1"></script>
    <script src="../../js/components/auth-seller-onboarding.js"></script>
    <script>
        let currentParams = {};

        document.addEventListener('DOMContentLoaded', async function() {
            const urlParams = new URLSearchParams(window.location.search);
            currentParams.search = urlParams.get('search') || '';
            currentParams.category = urlParams.get('category') || '';
            currentParams.petType = urlParams.get('petType') || '';
            currentParams.onSale = urlParams.get('onSale') || '';
            currentParams.shop = urlParams.get('shop') || '';

            if (currentParams.search) {
                document.getElementById('searchInput').value = currentParams.search;
            }
            if (currentParams.onSale === 'true') {
                document.getElementById('onSaleFilter').checked = true;
            }

            await loadCategories();
            await loadFilters();
            if (currentParams.petType) {
                const petInput = document.querySelector(`input[name="petType"][value="${currentParams.petType}"]`);
                if (petInput) petInput.checked = true;
            }
            await loadProducts();
            setupEventListeners();
        });

        async function loadCategories() {
            try {
                const response = await api.getCategories();
                const categories = response.data || [];
                const container = document.getElementById('categoryFilters');

                container.innerHTML = `<label><input type="radio" name="category" value="" checked> Táº¥t cáº£ danh má»¥c</label>` +
                    categories.map(cat => `<label><input type="radio" name="category" value="${cat._id}"> ${cat.name} (${cat.productCount || 0})</label>`).join('');

                container.querySelectorAll('input[name="category"]').forEach(input => {
                    input.addEventListener('change', () => {
                        currentParams.category = input.value;
                        loadProducts();
                    });
                });
            } catch (error) {
                console.error('KhĂ´ng thá»ƒ táº£i danh má»¥c:', error);
            }
        }

        async function loadFilters() {
            try {
                const response = await api.getProductFilters();
                const filters = response.data || {};
                const brandFilter = document.getElementById('brandFilter');
                brandFilter.innerHTML = '<option value="">Táº¥t cáº£ thÆ°Æ¡ng hiá»‡u</option>' +
                    (filters.brands || []).map(brand => `<option value="${brand}">${brand}</option>`).join('');
            } catch (error) {
                console.error('Failed to load filters:', error);
            }
        }

        async function loadProducts() {
            const container = document.getElementById('productsGrid');
            container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i></div>';

            try {
                const sortValue = document.getElementById('sortSelect')?.value || 'createdAt-desc';
                const [sortBy, sortOrder] = sortValue.split('-');

                const params = {
                    ...currentParams,
                    sortBy,
                    sortOrder,
                    limit: 20
                };

                params.brand = document.getElementById('brandFilter')?.value || '';
                params.petType = document.querySelector('input[name="petType"]:checked')?.value || '';
                params.inStock = document.getElementById('inStockFilter')?.checked ? 'true' : '';
                params.onSale = document.getElementById('onSaleFilter')?.checked ? 'true' : '';
                params.minRating = document.getElementById('ratingFilter')?.value || '';

                const response = await api.getProducts(params);
                const products = response.data || [];

                if (products.length === 0) {
                    container.innerHTML = '<p class="text-center">KhĂ´ng tĂ¬m tháº¥y sáº£n pháº©m nĂ o</p>';
                    return;
                }

                container.innerHTML = products.map(product => createProductCard(product)).join('');

                container.querySelectorAll('.quick-add').forEach(btn => {
                    btn.addEventListener('click', () => addToCart(btn.dataset.productId));
                });
            } catch (error) {
                container.innerHTML = '<p class="text-center">KhĂ´ng thá»ƒ táº£i danh sĂ¡ch sáº£n pháº©m</p>';
            }
        }

        function createProductCard(product) {
            const price = product.price || 0;
            const originalPrice = product.originalPrice || 0;
            const discount = originalPrice > price ? Math.round((1 - price / originalPrice) * 100) : 0;
            const image = product.images?.[0] || 'https://via.placeholder.com/300x300?text=Product';
            return `
                <div class="product-card">
                    <div class="product-image">
                        ${discount ? `<span class="product-badge badge-sale">-${discount}%</span>` : ''}
                        ${product.stock <= 0 ? `<span class="product-badge">Háº¿t hĂ ng</span>` : ''}
                        <a href="/pages/shop/product.html?id=${product._id}">
                            <img src="${image}" alt="${product.name}" class="product-img">
                        </a>
                        <div class="product-actions">
                            <button class="quick-add" data-product-id="${product._id}"><i class="fas fa-plus"></i> ThĂªm nhanh</button>
                        </div>
                    </div>
                    <div class="product-info">
                        <span class="product-brand">${product.brand || product.shop?.name || 'Cá»­a hĂ ng thĂº cÆ°ng'}</span>
                        <h4 class="product-name"><a href="/pages/shop/product.html?id=${product._id}">${product.name}</a></h4>
                        <div class="product-rating">
                            <div class="stars">${generateStars(product.rating || 0)}</div>
                            <span>(${product.reviewCount || 0})</span>
                        </div>
                        <div class="product-price">
                            <span class="price-current">${window.utils.formatPrice(price)}</span>
                            ${originalPrice > price ? `<span class="price-old">${window.utils.formatPrice(originalPrice)}</span>` : ''}
                        </div>
                        <div class="product-delivery">${product.stock > 0 ? 'CĂ²n hĂ ng' : 'Háº¿t hĂ ng'}</div>
                        <div class="product-delivery"><i class="fas fa-truck"></i> Free delivery</div>
                    </div>
                </div>
            `;
        }

        function generateStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                stars += i <= Math.round(rating) ? '<i class="fas fa-star"></i>' : '<i class="far fa-star"></i>';
            }
            return stars;
        }

        async function addToCart(productId) {
            if (!authManager.isAuthenticated) {
                authManager.showLoginModal();
                return;
            }
            try {
                await api.addToCart(productId, 1);
                authManager.showNotification('Added to cart!', 'success');
            } catch (error) {
                authManager.showNotification(error.message, 'error');
            }
        }

        function applyFilters() {
            currentParams.minPrice = document.getElementById('minPrice').value;
            currentParams.maxPrice = document.getElementById('maxPrice').value;
            loadProducts();
        }

        function setupEventListeners() {
            document.getElementById('searchBtn').addEventListener('click', () => {
                currentParams.search = document.getElementById('searchInput').value;
                loadProducts();
            });

            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    currentParams.search = e.target.value;
                    loadProducts();
                }
            });

            document.getElementById('sortSelect').addEventListener('change', loadProducts);
            document.getElementById('brandFilter').addEventListener('change', loadProducts);
            document.getElementById('ratingFilter').addEventListener('change', loadProducts);
            document.getElementById('inStockFilter').addEventListener('change', loadProducts);
            document.getElementById('onSaleFilter').addEventListener('change', loadProducts);
            document.querySelectorAll('input[name="petType"]').forEach(input => {
                input.addEventListener('change', () => {
                    currentParams.petType = input.value;
                    loadProducts();
                });
            });
        }
    </script>
    <script src="/js/text-normalizer.js?v=20260418-vntext-1"></script>
</body>
